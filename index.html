<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB_OS // PUNNY</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --surface-hover: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #888888;
            --accent: #d92d20; /* Nothing OS Red */
            --border: #2a2a2a;
            --radius: 12px;
            --trans-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --trans-slow: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, transparent 70%);
        }

        /* --- Animations --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .anim-element {
            opacity: 0;
            animation: fadeUp var(--trans-slow) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* --- Layout & Header --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .red-dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: pulseDot 3s infinite;
        }

        .logo p {
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* --- Tab Navigation --- */
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

            border:
