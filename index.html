<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punny's Study Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- PREMIUM DARK SYSTEM THEME --- */
        :root { 
            --bg-dark: #09090d; --panel-bg: #12121a; --border-color: #272733; 
            --accent-primary: #ff7b00; --text-main: #f1f5f9; --text-muted: #64748b; 
        }
        body { background: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; }
        
        /* SEARCH BAR FIX - Ensuring no white boxes */
        .search-bar { width: 100%; padding: 14px; background: #16161e; border: 1px solid var(--border-color); border-radius: 12px; color: white; }
        
        /* NOTEPAD FIX */
        .scratchpad-window { display: none; position: fixed; bottom: 90px; right: 30px; width: 300px; height: 350px; background: #1a1a24; border: 1px solid var(--border-color); border-radius: 12px; z-index: 2000; }
        
        /* Tracker Split Layout */
        .tracker-master-split-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .tracker-master-split-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

            projectId: "your-app",
        };

</body>
</html>
