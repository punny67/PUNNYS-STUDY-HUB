<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punny's Study Hub</title>
    <style>
        /* --- Global Resets & Fonts --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121214;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. Welcome / Splash Screen --- */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e1e24 0%, #0a0a0c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }

        .welcome-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 0.3s;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 1.2rem;
            color: #a0a0ab;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards 0.6s;
        }

        /* --- 2. Main Content Screen --- */
        .main-content {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: none; /* Hidden initially */
        }

        .main-content.reveal {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .main-header h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .main-header p {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* --- 3. Material Selection Cards --- */
        .card-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #1e1e24;
            border: 2px solid #2e2e38;
            border-radius: 16px;
            width: 260px;
            padding: 40px 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Hover Effects */
        .card:hover {
            transform: translateY(-10px);
            border-color: #ff7b00;
            box-shadow: 0 15px 30px rgba(255, 123, 0, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 123, 0, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .card p {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.4;
        }

        /* --- Keyframe Animations --- */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Screen Exit Animation */
        .slide-up {
            transform: translateY(-100vh);
            opacity: 0;
        }
    </style>
</head>
<body>

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <h1 class="welcome-title">Punny's Study Hub</h1>
        <p class="welcome-subtitle">Learn • Excel • Succeed</p>
    </div>

    <!-- Main Materials Dashboard -->
    <div class="main-content" id="mainContent">
        <div class="main-header">
            <h2>Select Your Stream</h2>
            <p>Choose the type of study materials you want to access</p>
        </div>
        
        <div class="card-container">
            <!-- CBSE Card -->
            <div class="card" onclick="selectMaterial('CBSE')">
                <div class="card-icon">📚</div>
                <h3>CBSE</h3>
                <p>School curriculum, NCERT solutions, notes, and board exam papers.</p>
            </div>

            <!-- JEE Card -->
            <div class="card" onclick="selectMaterial('JEE')">
                <div class="card-icon">🚀</div>
                <h3>JEE</h3>
                <p>IIT JEE Main & Advanced prep, mock tests, and advanced physics, chemistry, & math notes.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const welcomeScreen = document.getElementById("welcomeScreen");
            const mainContent = document.getElementById("mainContent");

            // Wait 2.5 seconds for welcome animations to finish, then transition
            setTimeout(() => {
                // Slide up and fade out the welcome screen
                welcomeScreen.classList.add("slide-up");
                
                // Show the main content with a delay so it syncs perfectly
                setTimeout(() => {
                    mainContent.classList.add("reveal");
                }, 300);
                
            }, 2500);
        });

        // Function to handle card selection
        function selectMaterial(type) {
            alert(`You selected ${type} materials! Redirecting...`);
            // You can replace the alert with actual navigation later, like:
            // window.location.href = `/${type.toLowerCase()}-dashboard.html`;
        }
    </script>
</body>
</html>
