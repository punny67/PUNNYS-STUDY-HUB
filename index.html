<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punny's Study Hub</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
        }
        .card h3 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-list li {
            margin: 0.5rem 0;
        }
        .file-list a {
            color: #555;
            text-decoration: none;
            display: block;
            padding: 0.3rem;
            border-radius: 4px;
        }
        .file-list a:hover {
            background-color: #f0f0f0;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 Punny's Study Hub</h1>
        <p>Your one-stop destination for class notes, files, and resources.</p>
    </header>

    <div class="container">
        <div class="grid">
            
            <div class="card">
                <h3>📐 Mathematics</h3>
                <ul class="file-list">
                    <li><a href="#">📄 Calculus_Notes.pdf (Coming Soon)</a></li>
                    <li><a href="#">📄 Algebra_Sheet.pdf (Coming Soon)</a></li>
                </ul>
            </div>

            <div class="card">
                <h3>⚛️ Physics</h3>
                <ul class="file-list">
                    <li><a href="#">📄 Mechanics_Lab_1.pdf (Coming Soon)</a></li>
                </ul>
            </div>

            <div class="card">
                <h3>🧬 Chemistry</h3>
                <ul class="file-list">
                    <li><a href="#">📄 Organic_Chemistry_Ch1.pdf (Coming Soon)</a></li>
                </ul>
            </div>

        </div>
    </div>

</body>
</html>
