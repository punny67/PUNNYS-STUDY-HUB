<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPT Style Study Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#121214] text-gray-100 font-sans min-h-screen p-6">

    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center bg-[#1e1e24] p-4 rounded-2xl shadow-xl">
            <h1 class="text-xl font-bold text-orange-500 tracking-wide">🔥 Study Session</h1>
            <div id="total-today" class="text-sm font-semibold bg-[#2a2a32] px-3 py-1 rounded-full">Today: 00:00:00</div>
        </header>

        <main class="bg-[#1e1e24] p-8 rounded-3xl text-center shadow-xl border border-gray-800">
            <select id="subject-select" class="bg-[#2a2a32] text-gray-200 px-4 py-2 rounded-xl mb-6 border border-gray-700 outline-none w-full max-w-xs text-center">
                <option value="Physics">Physics 🌌</option>
                <option value="Chemistry">Chemistry 🧪</option>
                <option value="Maths">Mathematics 📐</option>
            </select>

            <div id="timer" class="text-5xl font-mono font-black my-4 tracking-wider text-white">00:00:00</div>

            <button id="action-btn" class="mt-4 bg-orange-500 hover:bg-orange-600 text-white font-bold px-8 py-3 rounded-2xl w-full max-w-xs transition transform active:scale-95 shadow-lg shadow-orange-500/20">
                Start Tracking
            </button>
        </main>

        <section class="bg-[#1e1e24] p-4 rounded-2xl shadow-xl">
            <h2 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Today's Distribution</h2>
            <div class="h-48 flex items-center justify-center">
                <canvas id="yptChart"></canvas>
            </div>
        </section>
    </div>

    <script>
        let timerInterval;
        let secondsElapsed = 0;
        let isTracking = false;
        
        // Mock Database schema stored in localStorage
        let studyData = JSON.parse(localStorage.getItem('yptData')) || { Physics: 0, Chemistry: 0, Maths: 0 };

        const timerDisplay = document.getElementById('timer');
        const actionBtn = document.getElementById('action-btn');
        const subjectSelect = document.getElementById('subject-select');

        function formatTime(sec) {
            let hrs = Math.floor(sec / 3600).toString().padStart(2, '0');
            let mins = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
            let secs = (sec % 60).toString().padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        // Initialize Chart
        const ctx = document.getElementById('yptChart').getContext('2d');
        let yptChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(studyData),
                datasets: [{
                    data: Object.values(studyData),
                    backgroundColor: ['#ff6b6b', '#4ecdc4', '#ffe66d'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#9ca3af' } } },
                maintainAspectRatio: false
            }
        });

        function updateAnalytics() {
            yptChart.data.datasets[0].data = Object.values(studyData);
            yptChart.update();
            
            let total = Object.values(studyData).reduce((a, b) => a + b, 0);
            document.getElementById('total-today').innerText = `Today: ${formatTime(total)}`;
        }

        actionBtn.addEventListener('click', () => {
            if (!isTracking) {
                // Start tracking
                isTracking = true;
                actionBtn.innerText = "Stop Session";
                actionBtn.classList.replace('bg-orange-500', 'bg-red-500');
                subjectSelect.disabled = true;

                timerInterval = setInterval(() => {
                    secondsElapsed++;
                    timerDisplay.innerText = formatTime(secondsElapsed);
                }, 1000);
            } else {
                // Stop tracking and commit to database
                isTracking = false;
                clearInterval(timerInterval);
                actionBtn.innerText = "Start Tracking";
                actionBtn.classList.replace('bg-red-500', 'bg-orange-500');
                subjectSelect.disabled = false;

                let selectedSubject = subjectSelect.value;
                studyData[selectedSubject] += secondsElapsed;
                
                // Save to browser hard drive
                localStorage.setItem('yptData', JSON.stringify(studyData));
                
                secondsElapsed = 0;
                timerDisplay.innerText = "00:00:00";
                updateAnalytics();
            }
        });

        // Load stats on screen mount
        updateAnalytics();
    </script>
</body>
</html>
